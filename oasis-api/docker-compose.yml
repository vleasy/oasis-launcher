version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: oasis-postgres
    environment:
      POSTGRES_DB: oasis_launcher
      POSTGRES_USER: oasis
      POSTGRES_PASSWORD: oasis_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: oasis-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
